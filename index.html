<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Tic Tac TOP</title>
  <link rel="stylesheet" href="./styles.css">
  <script defer src="./script.js"></script>
</head>
<body>
  <h1 id="title">TIC TAC <em>TOP</em></h1>
  <section id="setup-game-section" class="visible">
    <div id="setup-names">
      <input type="text" id="player1-name" maxlength="15" placeholder="Player 1">
      <input type="text" id="player2-name" maxlength="15" placeholder="Player 2">
    </div>
    <div id="edit-players-info">
      <p>CHANGE PLAYERS NAME</p>
    </div>
    <div>
      <button id="play-button" type="button">PLAY</button>
    </div>
    <img src="./assets/images/setup-bg.png" height="600" width="600">
  </section>
  <section id="gameboard-section" class="hidden">
    <img id="gameboard" src="./assets/images/gameboard.png" alt="gameboard" height="600" width="600">
    <div id="spaces-container">
      <div class="board-space"></div>
      <div class="board-space"></div>
      <div class="board-space"></div>
      <div class="board-space"></div>
      <div class="board-space"></div>
      <div class="board-space"></div>
      <div class="board-space"></div>
      <div class="board-space"></div>
      <div class="board-space"></div>
    </div>
  </section>
  <section id="game-info" class="hidden">
      <div id="players-info">
        <div id="player1-name-info" class="player-name">PLAYER 1</div>
        <div id="turn-info"></div>
        <div id="player2-name-info" class="player-name">PLAYER 2</div>
      </div>
  </section>
</body>
</html>
