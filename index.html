<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Tic Tac Toe TOP</title>
  <link rel="stylesheet" href="./styles.css">
  <script defer src="./script.js"></script>
</head>
<body>
  <h1 id="title">TIC TAC TOE</h1>

  <div id="players-info">
    <div class="player-name">PLAYER 1</div>
    <!-- Dummy text content -->
    <div id="turn-info">PLAYER 1 TURN</div>
    <div class="player-name">PLAYER 2</div>
  </div>

  <section id="gameboard-section">
    <img id="gameboard" src="./assets/images/gameboard.png" alt="gameboard" height="600" width="600">

    <div id="spaces-container">
      <!-- The x and o mark img elements are going to be added through JS, this are dummy content -->
      <div class="board-space" id="space-0"><img src="./assets/images/x-mark.png" alt="x mark" height="90"></div>
      <div class="board-space" id="space-1"><img src="./assets/images/o-mark.png" alt="o mark" height="90"></div>
      <div class="board-space" id="space-2"><img src="./assets/images/x-mark.png" alt="x mark" height="90"></div>
      <div class="board-space" id="space-3"><img src="./assets/images/o-mark.png" alt="o mark" height="90"></div>
      <div class="board-space" id="space-4"><img src="./assets/images/x-mark.png" alt="x mark" height="90"></div>
      <div class="board-space" id="space-5"><img src="./assets/images/o-mark.png" alt="o mark" height="90"></div>
      <div class="board-space" id="space-6"><img src="./assets/images/o-mark.png" alt="o mark" height="90"></div>
      <div class="board-space" id="space-7"><img src="./assets/images/x-mark.png" alt="x mark" height="90"></div>
      <div class="board-space" id="space-8"><img src="./assets/images/x-mark.png" alt="x mark" height="90"></div>
    </div>

    <img id="win-line" src="./assets/images/win-line.png" alt="win line">
  </section>
</body>
</html>
